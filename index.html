<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GYMA - Meet The Future</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 3D Model Background Container */
        .spline-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Navigation */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through if needed */
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: white;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            pointer-events: auto; /* Make click work */
            text-decoration: none;
        }

        .logo span {
            color: #00ff41;
        }

        /* Top Right Buttons */
        .auth-buttons {
            display: flex;
            gap: 1rem;
            pointer-events: auto; /* Make clicks work */
        }

        .nav-btn {
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .login-btn {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .login-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .signup-btn {
            color: #0a0a0a;
            background: #00ff41;
            border: 1px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.4);
            background: #1aff57;
        }

        .content {
            position: absolute;
            bottom: 5%;
            left: 3%;
            z-index: 10;
            pointer-events: none; /* Text is not clickable, allowing drag on 3D behind it */
            max-width: 500px;
            background: rgba(8, 8, 8, 0.4); /* Make it much more transparent */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #b3b3b3 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.1rem;
            color: #d0d0d0;
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        /* CTA Button */
        .cta-button {
            display: inline-block;
            padding: 1.2rem 2.8rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #0a0a0a;
            background: #00ff41;
            border: none;
            border-radius: 100px;
            cursor: pointer;
            pointer-events: auto; /* Re-enable click for button */
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .cta-button:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.4);
            background: #1aff57;
        }

        /* Loading state to hide the spline logo briefly if desirable */
        spline-viewer {
            width: 100%;
            height: 100%;
        }

        /* Hide the Spline Logo watermark */
        .spline-watermark, #spline-viewer-logo {
            display: none !important;
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; }
            .content {
                bottom: 5%;
                left: 5%;
                right: 5%;
                padding: 2rem;
                text-align: center;
            }
            nav { padding: 1.5rem; }
        }
    </style>
    <!-- Import Spline Viewer Web Component -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.0.51/build/spline-viewer.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <nav>
            <a href="index.html" class="logo">GYMA<span>.</span></a>
            <div class="auth-buttons">
                <a href="login.html" class="nav-btn login-btn">Log In</a>
                <a href="login.html#signup" class="nav-btn signup-btn">Sign Up</a>
            </div>
        </nav>

        <!-- 3D Spline Robot Model -->
        <div class="spline-container">
            <!-- Spline URL provided by user -->
            <spline-viewer url="https://prod.spline.design/zbHiHVgoZgUAaMFp/scene.splinecode"></spline-viewer>
        </div>

        <!-- Typography / UI Overlay -->
        <div class="content">
            <h1>Intelligent<br>Movement.</h1>
            <p>Experience real-time biomechanical feedback engineered for precision, alignment, and injury prevention. Drag the robot to interact.</p>
            <a href="app.html" class="cta-button">Launch System</a>
        </div>
    </div>
    <script src="./nolo.js"></script>
</body>
</html>
